<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-deep: #030b1a;
        --glass-bg: rgba(10, 40, 90, 0.35);
        --glass-border: rgba(80, 160, 255, 0.25);
        --glass-shine: rgba(120, 190, 255, 0.08);
        --accent: #4fa3ff;
        --accent-bright: #7ec8ff;
        --accent-glow: rgba(79, 163, 255, 0.4);
        --text: #e8f4ff;
        --text-muted: rgba(180, 220, 255, 0.6);
      }

      body {
        font-family: 'Exo 2', sans-serif;
        background: var(--blue-deep);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        overflow-x: hidden;
        position: relative;
      }

      body::before, body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        animation: drift 8s ease-in-out infinite alternate;
      }
      body::before {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(30, 80, 180, 0.4), transparent 70%);
        top: -100px; left: -100px;
      }
      body::after {
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(0, 100, 200, 0.3), transparent 70%);
        bottom: -80px; right: -80px;
        animation-delay: -4s;
      }
      @keyframes drift {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(30px, 20px) scale(1.1); }
      }

      .game-card {
        position: relative;
        z-index: 1;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 48px 40px;
        max-width: 520px;
        width: 100%;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 8px 48px rgba(0, 60, 160, 0.4),
          inset 0 1px 0 rgba(120, 190, 255, 0.15),
          inset 0 -1px 0 rgba(0, 40, 100, 0.3);
        animation: fadeUp 0.6s ease both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .Title {
        font-family: 'Orbitron', monospace;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-align: center;
        color: var(--accent-bright);
        text-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(79, 163, 255, 0.2);
        margin-bottom: 36px;
      }

      .buttons-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 36px;
      }

      .move-button {
        background: var(--glass-shine);
        border: 1px solid var(--glass-border);
        width: 110px;
        height: 110px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
        position: relative;
        overflow: hidden;
      }
      .move-button::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, rgba(120, 190, 255, 0.15), transparent 65%);
      }
      .move-button:hover {
        transform: translateY(-6px) scale(1.06);
        border-color: var(--accent);
        box-shadow: 0 8px 32px var(--accent-glow), 0 0 0 1px rgba(79, 163, 255, 0.3);
        background: rgba(30, 80, 160, 0.4);
      }
      .move-button:active { transform: translateY(-2px) scale(0.98); }

      .move-icon {
        height: 52px; width: 52px;
        object-fit: contain;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        margin: 0 0 28px;
      }

      .result {
        font-family: 'Orbitron', monospace;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        min-height: 32px;
        letter-spacing: 0.06em;
        margin-bottom: 20px;
        transition: color 0.3s;
      }

      .js-moves {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-size: 14px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        min-height: 36px;
        margin-bottom: 28px;
      }
      .js-moves .move-icon { height: 36px; width: 36px; }

      .score {
        background: rgba(10, 30, 70, 0.5);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 16px 24px;
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-bottom: 24px;
        font-family: 'Orbitron', monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      .Reset-Score-button, .auto-play-button {
        font-family: 'Exo 2', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.06em;
        padding: 10px 22px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid var(--glass-border);
      }
      .Reset-Score-button {
        background: rgba(255, 95, 126, 0.12);
        color: #ff8fa3;
        border-color: rgba(255, 95, 126, 0.3);
      }
      .Reset-Score-button:hover {
        background: rgba(255, 95, 126, 0.25);
        box-shadow: 0 0 16px rgba(255, 95, 126, 0.2);
      }
      .auto-play-button {
        background: rgba(79, 163, 255, 0.12);
        color: var(--accent-bright);
        border-color: rgba(79, 163, 255, 0.3);
      }
      .auto-play-button:hover {
        background: rgba(79, 163, 255, 0.25);
        box-shadow: 0 0 16px var(--accent-glow);
      }
      .auto-play-button.active {
        background: rgba(79, 163, 255, 0.3);
        box-shadow: 0 0 20px var(--accent-glow);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="game-card">
      <p class="Title">Rock Paper Scissors</p>

      <div class="buttons-row">
        <button onclick="playGame('rock')" class="move-button">
          <img src="../images/rock-emoji.png" class="move-icon">
        </button>
        <button onclick="playGame('paper')" class="move-button">
          <img src="../images/paper-emoji.png" class="move-icon">
        </button>
        <button onclick="playGame('scissors')" class="move-button">
          <img src="../images/scissors-emoji.png" class="move-icon">
        </button>
      </div>

      <div class="divider"></div>

      <p class="js-result result"></p>
      <p class="js-moves"></p>
      <p class="js-score score"></p>

      <div class="action-buttons">
        <button onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
          localStorage.removeItem('score');
          updateScoreElement();
        " class="Reset-Score-button">Reset Score</button>
        <button class="auto-play-button" onclick="autoPlay()">Auto Play</button>
      </div>
    </div>

    <!--Polished With AI-->
    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0, losses: 0, ties: 0
      };

      updateScoreElement();

      let isAutoPlaying = false;
      let intervalId;

      function autoPlay() {
        const btn = document.querySelector('.auto-play-button');
        if (!isAutoPlaying) {
          intervalId = setInterval(function () {
            playGame(pickComputerMove());
          }, 1000);
          isAutoPlaying = true;
          btn.textContent = 'Stop Auto';
          btn.classList.add('active');
        } else {
          clearInterval(intervalId);
          isAutoPlaying = false;
          btn.textContent = 'Auto Play';
          btn.classList.remove('active');
        }
      }

      function playGame(playerMove) {
        const computerMove = pickComputerMove();
        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') result = 'You lose.';
          else if (computerMove === 'paper') result = 'You win.';
          else result = 'Tie.';
        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') result = 'You win.';
          else if (computerMove === 'paper') result = 'Tie.';
          else result = 'You lose.';
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') result = 'Tie.';
          else if (computerMove === 'paper') result = 'You lose.';
          else result = 'You win.';
        }

        if (result === 'You win.') score.wins += 1;
        else if (result === 'You lose.') score.losses += 1;
        else if (result === 'Tie.') score.ties += 1;

        localStorage.setItem('score', JSON.stringify(score));
        updateScoreElement();

        const resultEl = document.querySelector('.js-result');
        resultEl.innerHTML = result;
        resultEl.style.color =
          result === 'You win.' ? '#4fffb0' :
          result === 'You lose.' ? '#ff5f7e' : '#ffd166';

        document.querySelector('.js-moves').innerHTML =
          `You <img src="../images/${playerMove}-emoji.png" class="move-icon">
           <img src="../images/${computerMove}-emoji.png" class="move-icon"> Computer`;
      }

      function updateScoreElement() {
        document.querySelector('.js-score').innerHTML =
          `Wins: ${score.wins} &nbsp;|&nbsp; Losses: ${score.losses} &nbsp;|&nbsp; Ties: ${score.ties}`;
      }

      function pickComputerMove() {
        const r = Math.random();
        if (r < 1/3) return 'rock';
        else if (r < 2/3) return 'paper';
        else return 'scissors';
      }
    </script>
  </body>
</html>
