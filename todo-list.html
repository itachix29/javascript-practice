<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #c8f135;
      --accent-dim: #a8d120;
      --text: #f0f0f0;
      --text-muted: #888;
      --red: #ff4d4d;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 36px;
    }
    .header-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .header h1 span {
      color: var(--accent);
    }
    .task-count {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .task-count strong {
      color: var(--text);
    }

    /* Input area */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { border-color: var(--accent); }
    .input-field[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
    .date-field { max-width: 160px; }

    .add-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .add-btn:hover { background: var(--accent-dim); }
    .add-btn:active { transform: scale(0.97); }

    /* Todo list */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .todo-item:hover {
      border-color: #3e3e3e;
      transform: translateX(3px);
    }

    .todo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .todo-info {
      flex: 1;
      min-width: 0;
    }
    .todo-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .todo-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .todo-date span {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      letter-spacing: 0.03em;
    }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .delete-btn:hover {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-label">My Workspace</div>
      <h1>Todo<span>.</span></h1>
      <p class="task-count" id="task-count"><strong>0</strong> tasks remaining</p>
    </div>

    <div class="input-card">
      <div class="input-row">
        <input class="input-field js-name-input" placeholder="What needs to be done?">
      </div>
      <div class="input-row">
        <input type="date" class="input-field date-field js-due-date-input">
        <button class="add-btn" onclick="addTodo()">+ Add Task</button>
      </div>
    </div>

    <div class="section-label">Tasks</div>
    <div class="todo-list js-todo-list"></div>
  </div>

  <script>
    const todoList = [
      { name: 'make dinner', dueDate: '2026-03-03' },
      { name: 'wash dishes', dueDate: '2026-03-03' }
    ];

    renderTodoList();

    function renderTodoList() {
      const container = document.querySelector('.js-todo-list');
      const countEl = document.getElementById('task-count');

      countEl.innerHTML = `<strong>${todoList.length}</strong> task${todoList.length !== 1 ? 's' : ''} remaining`;

      if (todoList.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✓</div>
            <p>All clear! Add a task above to get started.</p>
          </div>`;
        return;
      }

      let html = '';
      for (let i = 0; i < todoList.length; i++) {
        const { name, dueDate } = todoList[i];
        const formatted = dueDate
          ? new Date(dueDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
          : 'No due date';
        html += `
          <div class="todo-item">
            <div class="todo-dot"></div>
            <div class="todo-info">
              <div class="todo-name">${name}</div>
              <div class="todo-date"><span>📅 ${formatted}</span></div>
            </div>
            <button class="delete-btn" onclick="todoList.splice(${i}, 1); renderTodoList();">Delete</button>
          </div>`;
      }
      container.innerHTML = html;
    }

    function addTodo() {
      const nameInput = document.querySelector('.js-name-input');
      const dateInput = document.querySelector('.js-due-date-input');
      const name = nameInput.value.trim();
      const dueDate = dateInput.value;
      if (!name) {
        nameInput.focus();
        nameInput.style.borderColor = '#ff4d4d';
        setTimeout(() => nameInput.style.borderColor = '', 1000);
        return;
      }
      todoList.push({ name, dueDate });
      nameInput.value = '';
      dateInput.value = '';
      renderTodoList();
    }

    document.querySelector('.js-name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });
  </script>
</body>
</html>
