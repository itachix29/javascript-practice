<!DOCTYPE html>
<html lang="en">
<head>
    <title>Instagram</title>
    

</head>
<body>
    <p>
        <button onclick="updateMsg();" class="msg-js">Add</button>
        <button onclick="reduce();">Remove</button>
    </p>

    <button onclick="
        setTimeout(function(){
            document.querySelector('.finish-input').innerHTML='Finished!';
        },1000)
        " class="finish-input">Finish</button>

    <button onclick="
    document.querySelector('.js-loading').innerHTML='Loading...'
    setTimeout(function(){
        document.querySelector('.js-loading').innerHTML='finished!'
    },1000)
    "class= 'js-loading'>finished!</button>

    <button class="js-button"
    onclick="displayMsg();
    ">Add to Cart</button>
    <p class="js-message"></p>


    
    
    
    
    
    <script>
        let messages=2;
        const add = function(){
            console.log(2+3);
        }
        add();
        add();

        function runTwice(fun){
            fun();
            fun();
        }
        runTwice(function (){
            console.log('12b');
        });
        
        runTwice(add);

        function displayMsg(){
            const messageElement = document.querySelector('.js-message');
            messageElement.innerHTML= 'Added';

            setTimeout(function(){
                messageElement.innerHTML='';
            },2000)

        }

        let show =true;

       setInterval(function(){
        if(show){
            if(messages===0){
               document.title= 'Instagram' 
            }else if(messages>0){
                document.title = `${messages} messages`;
            }
        
            
        }else{
            document.title= 'Instagram';
        }
        show=!show;
        },1000)


        function updateMsg(){
            messages++;
        }

        function reduce(){
            messages--;
        }


        

    </script>
    
</body>
</html>
